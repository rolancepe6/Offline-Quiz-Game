<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Offline Quiz Game</title>
    <!-- app icons -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">

<style>
*{box-sizing:border-box}

body{
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    min-height:100vh;
}

.container{
    width:460px;
    max-width:92vw;
    padding:28px;
    border-radius:16px;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 1px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.8);
    animation: slideUp .4s ease;
}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

h2{
    text-align:center;
    margin:0 0 12px 0;
    color:#2d3748;
    font-size:28px;
    font-weight:700;
}

select#category{
    width:100%;
    padding:10px 12px;
    border:2px solid #e2e8f0;
    border-radius:8px;
    background:#fff;
    color:#2d3748;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:all .2s ease;
    margin-bottom:4px;
}

select#category:hover{border-color:#667eea;background:#f7fafc}
select#category:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}

button{
    width:100%;
    padding:12px 14px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
    transition:all .15s ease;
}

button:active{transform:scale(.98)}

#startBtn{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:white;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
}

#startBtn:hover{
    transform:translateY(-2px);
    box-shadow: 0 6px 20px rgba(102,126,234,0.6);
}

.option{
    background:#f7fafc;
    text-align:left;
    padding:12px 14px;
    color:#2d3748;
    border:2px solid transparent;
    transition:all .15s ease;
}

.option:hover{
    background:#edf2f7;
    border-color:#cbd5e0;
    transform:translateX(4px);
}

.option:disabled{opacity:.6;cursor:not-allowed}

.correct{
    background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
    color:white;
    border-color:#38a169;
    animation: correctPulse .4s ease;
}

.wrong{
    background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
    color:white;
    border-color:#e53e3e;
    animation: wrongShake .4s ease;
}

@keyframes correctPulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.02)}
    100%{transform:scale(1)}
}

@keyframes wrongShake{
    0%, 100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    75%{transform:translateX(4px)}
}

.hidden{display:none}

#score{
    text-align:center;
    font-weight:700;
    margin-top:12px;
    color:#2d3748;
    font-size:16px;
}

.meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    gap:8px;
}

.progress{
    height:6px;
    background:#e2e8f0;
    border-radius:999px;
    overflow:hidden;
    flex:1;
}

.progress > i{
    display:block;
    height:100%;
    background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    width:0%;
    transition:width .3s ease;
}

.small{
    font-size:12px;
    color:#718096;
    font-weight:600;
    white-space:nowrap;
}

#question{
    color:#2d3748;
    font-size:16px;
    font-weight:600;
    line-height:1.5;
    margin:16px 0 14px 0;
    text-align:center;
}

#options{min-height:140px}

.next-button{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color:white;
    box-shadow: 0 4px 15px rgba(102,126,234,0.3);
}

.next-button:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow: 0 6px 20px rgba(102,126,234,0.5);
}

.next-button:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
}

#restart{
    background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
    color:white;
    box-shadow: 0 4px 15px rgba(72,187,120,0.3);
    margin-top:12px;
}

#restart:hover{
    transform:translateY(-2px);
    box-shadow: 0 6px 20px rgba(72,187,120,0.5);
}
</style>
</head>

<body>

<div class="container">

<h2>Quiz Game</h2>

<div class="meta">
    <select id="category">
        <option value="science">Science</option>

 </div>

<button id="startBtn">Start Quiz</button>

<div id="quiz" class="hidden">
    <div class="meta">
        <div class="small">Question <span id="qnum">1</span> / <span id="qtot">1</span></div>
        <div class="progress" aria-hidden="true"><i id="progFill"></i></div>
    </div>
    <p id="question"></p>
    <div id="options"></div>
    <button id="nextBtn" class="next-button" disabled>Next</button>
    <p id="score"></p>
    <button id="restart" class="hidden">Restart</button>
</div>

</div>

    ]

// Round-specific questions will be chosen from the pools above
let roundQuestions = [];

let currentCategory;
let currentQuestionIndex = 0;
let score = 0;

let highScore = 0;

// helper: Fisher-Yates shuffle
function shuffleArray(a){
    for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function updateProgress(){
    const tot = (roundQuestions?.length) || 1;
    const cur = currentQuestionIndex + 1;
    const pct = Math.round((currentQuestionIndex / tot) * 100);
    const fill = document.getElementById('progFill');
    if(fill) fill.style.width = pct + '%';
    const qnum = document.getElementById('qnum');
    const qtot = document.getElementById('qtot');
    if(qnum) qnum.textContent = cur;
    if(qtot) qtot.textContent = tot;
}

// initialize high score display from localStorage
document.addEventListener('DOMContentLoaded', () => {
    try {
        const hs = localStorage.getItem('highScore');
        highScore = hs ? Number(hs) : 0;
        const el = document.getElementById('highscore');
        if(el) el.textContent = highScore;
    } catch(e) {
        console.log('localStorage not available');
    }
});

// Ensure all functions are safe and wait for DOM
if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initializeApp);
} else {
    initializeApp();
}

function initializeApp(){
    const startBtn = document.getElementById('startBtn');
    if(startBtn){
        startBtn.onclick = startGame;
    }
    
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn){
        nextBtn.onclick = nextQuestion;
    }
    
    const restartBtn = document.getElementById('restart');
    if(restartBtn){
        restartBtn.onclick = restartGame;
    }
}

function startGame(){
    const categorySelect = document.getElementById("category");
    if(!categorySelect) return;
    
    currentCategory = categorySelect.value;
    currentQuestionIndex = 0;
    score = 0;

    const startBtn = document.getElementById('startBtn');
    if(startBtn) startBtn.classList.add('hidden');

    const quizDiv = document.getElementById("quiz");
    if(quizDiv) quizDiv.classList.remove("hidden");
    
    const scoreDiv = document.getElementById("score");
    if(scoreDiv) scoreDiv.textContent = "";
    
    const restartBtn = document.getElementById("restart");
    if(restartBtn) restartBtn.classList.add("hidden");
    
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn) nextBtn.disabled = true;

    // choose 10 random questions from the 50-item pool
    roundQuestions = shuffleArray(quizData[currentCategory].slice());
    roundQuestions = roundQuestions.slice(0, 10);

    const qtotEl = document.getElementById('qtot');
    if(qtotEl) qtotEl.textContent = roundQuestions.length;
    
    updateProgress();
    showQuestion();
}

function showQuestion(){
    const questionData = roundQuestions[currentQuestionIndex];
    document.getElementById("question").textContent = questionData.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    questionData.options.forEach(option => {
        const button = document.createElement("button");
        button.textContent = option;
        button.classList.add("option");
        button.onclick = () => selectAnswer(button, option);
        optionsDiv.appendChild(button);
    });

    // ensure Next is disabled until an answer is picked
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn) nextBtn.disabled = true;
    updateProgress();
}

function selectAnswer(button, selected){
    const correctAnswer = roundQuestions[currentQuestionIndex].answer;
    const buttons = document.querySelectorAll(".option");

    buttons.forEach(btn => btn.disabled = true);

    if(selected === correctAnswer){
        button.classList.add("correct");
        score++;
    } else {
        button.classList.add("wrong");
        buttons.forEach(btn => {
            if(btn.textContent === correctAnswer){
                btn.classList.add("correct");
            }
        });
    }

    // enable Next
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn) nextBtn.disabled = false;
}

function nextQuestion(){
    currentQuestionIndex++;

    if(currentQuestionIndex < roundQuestions.length){
        showQuestion();
    } else {
        endGame();
    }
}

function endGame(){
    const quizDiv = document.getElementById("quiz");
    if(quizDiv) quizDiv.classList.add("hidden");
    
    const scoreDiv = document.getElementById("score");
    if(scoreDiv) scoreDiv.textContent =
        "Final Score: " + score + " / " + roundQuestions.length;
    
    const restartBtn = document.getElementById("restart");
    if(restartBtn) restartBtn.classList.remove("hidden");

    // Save high score locally (offline storage)
    if(score > highScore){
        highScore = score;
        try {
            localStorage.setItem('highScore', String(highScore));
        } catch(e) {
            console.log('localStorage not available');
        }
        const el = document.getElementById('highscore');
        if(el) el.textContent = highScore;
    }
}

function restartGame(){
    startGame();
}


</script>

<!-- Install button + service worker registration -->
<button id="installBtn" class="hidden next-button" style="position:fixed;bottom:18px;right:18px;padding:10px 14px;border-radius:999px;z-index:999;">Install App</button>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('Service worker registered'))
        .catch((err) => console.error('SW registration failed:', err));
}

let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.classList.remove('hidden');
});

if (installBtn) {
    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const choiceResult = await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.classList.add('hidden');
        console.log('User choice:', choiceResult);
    });
}
</script>
